<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 결과 조회 - LIMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: 'var(--bg-color)',
                            card: 'var(--card-bg)',
                            border: 'var(--border-color)',
                            text: 'var(--text-color)',
                            muted: 'var(--muted-text)'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Light Mode Defaults */
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f9f9f9;
            --border-color: #bbb;
            --muted-text: #666;
            
            /* Chart Colors (Light) */
            --chart-text: #333333;
            --chart-grid: #e5e7eb;
            --chart-axis: #64748b;
        }

        /* Dark Mode */
        .dark {
            --bg-color: #2f343f;
            --text-color: #e0e0e0;
            --card-bg: #3f4652;
            --border-color: rgba(255, 255, 255, 0.15);
            --muted-text: #a0a0a0;
            
            /* Chart Colors (Dark) */
            --chart-text: #ffffff;
            --chart-grid: #64748b;
            --chart-axis: #cbd5e1;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        /* Toast 알림 스타일 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 300px;
            max-width: 500px;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast.success {
            background-color: #10b981;
            color: white;
        }
        .toast.error {
            background-color: #ef4444;
            color: white;
        }
        .toast.info {
            background-color: #3b82f6;
            color: white;
        }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
        .toast.hiding {
            animation: slideOut 0.3s ease-out;
        }
    </style>
</head>
<body class="dark min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <!-- 헤더 -->
        <div class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-dark-text mb-2">
                    <span id="page-title">시험 결과 조회</span>
                </h1>
                    <p id="test-subtitle" class="text-dark-muted"></p>
                </div>
                <div class="flex gap-3">
                    <button onclick="window.location.href='/lims/list'" 
                            class="px-4 py-2 bg-dark-card text-dark-text border border-dark-border rounded-lg hover:bg-slate-700 transition">
                        목록으로
                    </button>
                    <button onclick="window.location.href='/lims/edit/{{ test_id }}'" 
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                        편집
                    </button>
                    <button onclick="refreshData()" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        데이터 새로고침
                    </button>
                </div>
            </div>
        </div>

        <!-- 그래프 영역 -->
        <div class="bg-dark-card rounded-xl p-6 border border-dark-border mb-6">
            <div class="mb-4">
                <h2 id="chart-main-title" class="text-2xl font-bold text-white text-center"></h2>
                <p id="chart-sub-title" class="text-lg text-dark-muted text-center"></p>
            </div>
            <div class="relative" style="height: 500px;">
                <canvas id="result-chart"></canvas>
            </div>
        </div>

        <!-- 데이터 테이블 -->
        <div class="bg-dark-card rounded-xl border border-dark-border overflow-hidden">
            <div class="p-6 border-b border-dark-border">
                <h2 class="text-xl font-semibold text-white flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                    원본 데이터
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead id="data-table-head" class="bg-dark-bg">
                        <!-- 헤더가 동적으로 추가됩니다 -->
                    </thead>
                    <tbody id="data-table-body" class="divide-y divide-dark-border">
                        <!-- 데이터가 동적으로 추가됩니다 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 토스트 컨테이너 -->
        <div id="toast-container"></div>

        <!-- 로딩 인디케이터 -->
        <div id="loading" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-dark-card rounded-lg p-6 flex items-center gap-4">
                <svg class="animate-spin h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-white text-lg">데이터 로딩 중...</span>
            </div>
        </div>
    </div>

    <script>
        const testId = {{ test_id }};
        let chartInstance = null;
        let testData = null;

        function getCssVar(name) {
            return getComputedStyle(document.body).getPropertyValue(name).trim();
        }

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', async () => {
            await loadTestInfo();
            await loadData();
        });

        // 시험 정보 로드
        async function loadTestInfo() {
            try {
                const response = await fetch(`/lims/api/tests/${testId}`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                testData = result.data;

                // 제목 설정
                document.getElementById('page-title').textContent = testData.test_title || '시험 결과 조회';
                document.getElementById('test-subtitle').textContent = testData.product_name || '';
                document.getElementById('chart-main-title').textContent = testData.main_title || testData.test_title || '';
                document.getElementById('chart-sub-title').textContent = testData.sub_title || testData.product_name || '';

            } catch (error) {
                showToast('시험 정보 로드 실패: ' + error.message, 'error');
                console.error(error);
            }
        }

        // 데이터 정규화 함수
        function normalizeData(data) {
            if (!data) return { columns: [], rows: [] };
            
            // Array of Objects: [{ col1: val, col2: val }, ...]
            if (Array.isArray(data)) {
                if (data.length === 0) return { columns: [], rows: [] };
                const columns = Object.keys(data[0]);
                const rows = data.map(obj => columns.map(col => obj[col]));
                return { columns, rows };
            }
            
            // Chart.js Data Format Support
            if (data.labels && data.datasets) {
                const columns = ['Label'];
                data.datasets.forEach((ds, index) => {
                    columns.push(ds.label || `Dataset ${index + 1}`);
                });
                
                const rows = [];
                if (Array.isArray(data.labels)) {
                    data.labels.forEach((label, i) => {
                        const row = [label];
                        data.datasets.forEach(ds => {
                            const val = ds.data[i];
                            if (typeof val === 'object' && val !== null) {
                                row.push(val.y !== undefined ? val.y : JSON.stringify(val));
                            } else {
                                row.push(val);
                            }
                        });
                        rows.push(row);
                    });
                }
                return { columns, rows };
            }

            // Headers alias support
            if (data.headers && !data.columns) {
                data.columns = data.headers;
            }
            
            if (!data.columns) data.columns = [];
            if (!data.rows) data.rows = [];
            
            return data;
        }

        // 데이터 로드 및 차트 생성
        async function loadData() {
            showLoading(true);
            try {
                const response = await fetch(`/lims/api/gsheet/data/${testId}`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                const data = normalizeData(result.data);

                // 테이블 렌더링
                renderTable(data.columns, data.rows);

                // 차트 렌더링
                renderChart(data.columns, data.rows);

            } catch (error) {
                showToast('데이터 로드 실패: ' + error.message, 'error');
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        // 테이블 렌더링
        function renderTable(columns, rows) {
            const thead = document.getElementById('data-table-head');
            const tbody = document.getElementById('data-table-body');

            // 헤더 렌더링
            thead.innerHTML = `
                <tr>
                    ${columns.map(col => `
                        <th class="px-6 py-3 text-left text-xs font-medium text-dark-muted uppercase tracking-wider">
                            ${escapeHtml(col)}
                        </th>
                    `).join('')}
                </tr>
            `;

            // 데이터 렌더링
            tbody.innerHTML = rows.map(row => `
                <tr class="hover:bg-dark-bg transition">
                    ${row.map(cell => `
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-dark-text">
                            ${escapeHtml(String(cell))}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }

        // 차트 렌더링
        function renderChart(columns, rows) {
            if (chartInstance) {
                chartInstance.destroy();
            }

            // 차트 설정 로드
            const settings = testData.chart_settings || {};
            
            const xAxis = settings.x_axis || {};
            const yAxis = settings.y_axis || {};
            const scaleType = xAxis.scale_type || 'category'; // 'category' or 'linear'

            // X축 라벨 추출 (항목형일 때)
            let labels = rows.map(row => row[0]);
            let xValues = [];
            
            if (scaleType === 'linear') {
                xValues = rows.map(row => parseFloat(row[0]));
                labels = null; 
            }

            const datasets = [];
            // Design specified palette
            const defaultColors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22', '#1abc9c', '#34495e'];
            const customColors = settings.dataset_colors || [];

            for (let i = 1; i < columns.length; i++) {
                const color = customColors[i - 1] || defaultColors[(i - 1) % defaultColors.length];
                
                let dataPoints;
                if (scaleType === 'linear') {
                    dataPoints = rows.map((row, idx) => ({
                        x: xValues[idx],
                        y: parseFloat(row[i]) || 0
                    })).filter(pt => !isNaN(pt.x));
                    dataPoints.sort((a, b) => a.x - b.x);
                } else {
                    dataPoints = rows.map(row => parseFloat(row[i]) || 0);
                }
                
                const isBar = (settings.chart_type === 'bar');

                let fillOption = false;
                if (settings.fill === 'origin') fillOption = 'origin';
                else if (settings.fill === 'start') fillOption = 'start';
                else if (settings.fill === true || settings.fill === 'true') fillOption = true;
                else if (isBar) fillOption = true;

                const hexToRgba = (hex, alpha) => {
                    if (!hex || hex.length < 7) return `rgba(100, 100, 100, ${alpha})`;
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
                };

                let bgColor;
                if (isBar) {
                    // 단일 데이터셋이면서 여러 색상이 지정된 경우 각 막대별 색상 적용
                    if (columns.length === 2 && customColors.length > 1) {
                        bgColor = customColors;
                    } else {
                        bgColor = color;
                    }
                } else {
                    bgColor = fillOption ? hexToRgba(color, 0.2) : color;
                }
                
                datasets.push({
                    label: columns[i],
                    data: dataPoints,
                    borderColor: color,
                    backgroundColor: bgColor,
                    borderWidth: isBar ? 0 : 3,
                    pointBackgroundColor: color,
                    pointBorderColor: '#ffffff',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 8,
                    tension: settings.line_tension !== undefined ? parseFloat(settings.line_tension) : 0.3,
                    fill: fillOption
                });
            }

            const ySpecLine = settings.y_spec_line || settings.spec_line;
            const xSpecLine = settings.x_spec_line;
            const annotations = {};
            if (ySpecLine && ySpecLine.show) {
                annotations.yLine = {
                    type: 'line',
                    yMin: ySpecLine.value,
                    yMax: ySpecLine.value,
                    borderColor: ySpecLine.color || '#ff0000',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    label: {
                        display: true,
                        content: ySpecLine.label || 'Y 기준선',
                        position: 'end',
                        backgroundColor: ySpecLine.color || '#ff0000',
                        color: '#ffffff'
                    }
                };
            }
            if (xSpecLine && xSpecLine.show) {
                annotations.xLine = {
                    type: 'line',
                    xMin: xSpecLine.value,
                    xMax: xSpecLine.value,
                    borderColor: xSpecLine.color || '#00ff00',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    label: {
                        display: true,
                        content: xSpecLine.label || 'X 기준선',
                        position: 'start',
                        backgroundColor: xSpecLine.color || '#00ff00',
                        color: '#ffffff'
                    }
                };
            }

            // Resolve CSS variables
            const isDark = document.body.classList.contains('dark');
            const themeText = getCssVar('--chart-text') || (isDark ? '#cbd5e1' : '#475569');
            const themeGrid = getCssVar('--chart-grid') || (isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)');
            const themeAxis = getCssVar('--chart-axis') || (isDark ? '#64748b' : '#94a3b8');

            const isRadial = ['pie', 'doughnut', 'radar', 'polarArea'].includes(settings.chart_type);
            const scales = {
                x: {
                    type: scaleType, // 'category' or 'linear'
                    title: {
                        display: true,
                        text: xAxis.title || columns[0],
                        color: themeAxis,
                        font: { size: 16, weight: '600' },
                        padding: { top: 10 }
                    },
                    min: (scaleType === 'linear' && xAxis.min !== undefined) ? xAxis.min : undefined,
                    max: (scaleType === 'linear' && xAxis.max !== undefined) ? xAxis.max : undefined,
                    ticks: {
                        color: themeAxis,
                        font: { size: 14 },
                        maxRotation: 45,
                        minRotation: 0,
                        stepSize: (scaleType === 'linear' && xAxis.interval) ? xAxis.interval : undefined
                    },
                    grid: {
                        color: themeGrid,
                        borderColor: themeGrid,
                        tickColor: themeGrid,
                        drawBorder: true,
                        display: xAxis.show_grid !== false
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: yAxis.title || 'Y축',
                        color: themeAxis,
                        font: { size: 16, weight: '600' },
                        padding: { bottom: 10 }
                    },
                    min: yAxis.min !== undefined ? yAxis.min : undefined,
                    max: yAxis.max !== undefined ? yAxis.max : undefined,
                    ticks: {
                        color: themeAxis,
                        font: { size: 14 },
                        stepSize: yAxis.interval || undefined
                    },
                    grid: {
                        color: themeGrid,
                        borderColor: themeGrid,
                        tickColor: themeGrid,
                        drawBorder: true,
                        display: yAxis.show_grid !== false
                    }
                }
            };

            const ctx = document.getElementById('result-chart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: settings.chart_type || 'line',
                data: {
                    labels: labels,
                    datasets: datasets.map(ds => ({
                         ...ds,
                         pointStyle: settings.point_style !== 'line' ? (settings.point_style || 'rectRounded') : 'rectRounded'
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: 10 },
                    animation: {
                        duration: settings.animation_duration !== undefined ? settings.animation_duration : 1000,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            display: settings.legend_position !== 'false',
                            position: settings.legend_position !== 'false' ? (settings.legend_position || 'bottom') : 'top',
                            labels: {
                                color: themeText,
                                font: { size: 12, weight: 'bold' },
                                usePointStyle: true,
                                pointStyle: settings.point_style !== 'line' ? (settings.point_style || 'rectRounded') : 'rectRounded'
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        },
                        annotation: Object.keys(annotations).length > 0 ? {
                            annotations: annotations
                        } : undefined
                    },
                    scales: isRadial ? undefined : scales
                }
            });
        }

        // 데이터 새로고침
        async function refreshData() {
            await loadData();
            showToast('데이터가 새로고침되었습니다.', 'success');
        }


        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.remove('hidden');
            } else {
                loading.classList.add('hidden');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
            toast.innerHTML = `
                <span style="font-size: 20px; font-weight: bold;">${icon}</span>
                <span style="flex: 1;">${message}</span>
            `;
            
            container.appendChild(toast);
            
            // 3초 후 자동 제거
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => {
                    container.removeChild(toast);
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
