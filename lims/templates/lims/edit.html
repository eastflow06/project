<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시험 설정 편집 - LIMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: 'var(--bg-color)',
                            card: 'var(--card-bg)',
                            border: 'var(--border-color)',
                            text: 'var(--text-color)',
                            muted: 'var(--muted-text)'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* Light Mode Defaults */
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f9f9f9;
            --border-color: #bbb;
            --muted-text: #666;
        }

        /* Dark Mode */
        .dark {
            --bg-color: #2f343f;
            --text-color: #e0e0e0;
            --card-bg: #3f4652;
            --border-color: rgba(255, 255, 255, 0.15);
            --muted-text: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        /* Toast 알림 스타일 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            min-width: 300px;
            max-width: 500px;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast.success {
            background-color: #10b981;
            color: white;
        }
        .toast.error {
            background-color: #ef4444;
            color: white;
        }
        .toast.info {
            background-color: #3b82f6;
            color: white;
        }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
        .toast.hiding {
            animation: slideOut 0.3s ease-out;
        }

        /* 메인 설정 탭 컴팩트 스타일 */
        #tab-content-main {
            font-size: 0.75rem !important;
        }
        #tab-content-main .bg-dark-card {
            padding: 10px !important;
            border-radius: 6px !important;
        }
        #tab-content-main h2 {
            font-size: 0.9rem !important;
            margin-bottom: 0.5rem !important;
        }
        #tab-content-main input:not([type="range"]),
        #tab-content-main select {
            padding: 1px 6px !important;
            font-size: 0.75rem !important;
            height: 24px !important; /* 일관된 높이 설정 (더 작게) */
            border-radius: 4px !important;
        }
        #tab-content-main input[type="color"] {
            height: 24px !important;
            width: 32px !important;
            padding: 0 !important;
        }
        #tab-content-main button.px-4 {
             padding-left: 0.75rem !important;
             padding-right: 0.75rem !important;
             padding-top: 0.25rem !important;
             padding-bottom: 0.25rem !important;
             font-size: 0.75rem !important;
             height: 24px !important;
        }
        
        /* Override spacing for direct children of #tab-content-main */
        #tab-content-main > :not([hidden]) ~ :not([hidden]) {
            margin-top: 0.5rem !important;
        }
        /* Override spacing for nested space-y-* classes */
        #tab-content-main .space-y-6 > :not([hidden]) ~ :not([hidden]) {
            margin-top: 0.5rem !important;
        }
        #tab-content-main .space-y-4 > :not([hidden]) ~ :not([hidden]) {
            margin-top: 0.35rem !important;
        }
        
        /* Grid gaps */
        #tab-content-main .gap-6 {
            gap: 0.5rem !important;
        }
        #tab-content-main .gap-4 {
            gap: 0.35rem !important; /* 더 좁게 */
        }
        #tab-content-main .grid-cols-2 {
             /* 필요한 경우 여기서 grid 설정을 덮어쓸 수 있음 */
        }

        #tab-content-main label {
            font-size: 0.75rem !important;
            margin-bottom: 1px !important;
            color: #94a3b8; /* text-dark-muted */
        }
        #tab-content-main svg.w-5 {
            width: 0.875rem !important;
            height: 0.875rem !important;
        }
    </style>
</head>
<body class="dark min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- 헤더 -->
        <div class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-dark-text mb-2">
                        <span id="page-title">시험 설정 편집</span>
                    </h1>
                    <p class="text-dark-muted">시험 정보와 그래프 설정을 관리합니다</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="history.back()" 
                            class="px-4 py-2 bg-dark-card text-dark-text border border-dark-border rounded-lg hover:bg-slate-700 transition">
                        취소
                    </button>
                    <button onclick="saveTest()" 
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                        저장
                    </button>
                </div>
            </div>
        </div>

        <!-- 메인 폼 -->
        <form id="test-form" class="space-y-6">
            <!-- 기본 정보 (Compact) -->
            <div class="bg-dark-card rounded-lg px-6 py-4 border border-dark-border">
                <div class="flex items-center gap-6">
                    <div class="flex-1">
                        <label class="block text-xs font-medium text-dark-muted mb-1">
                            시험 제목 <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="test_title" name="test_title" required
                               class="w-full px-3 py-2 bg-dark-bg border border-dark-border rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm"
                               placeholder="예: 페라스타AG의 안정성시험">
                    </div>
                    <div class="w-1/3">
                        <label class="block text-xs font-medium text-dark-muted mb-1">
                            제품명
                        </label>
                        <input type="text" id="product_name" name="product_name"
                               class="w-full px-3 py-2 bg-dark-bg border border-dark-border rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm"
                               placeholder="예: 페라스타AG">
                    </div>
                </div>
            </div>

            <!-- 탭 네비게이션 -->
            <div class="border-b border-dark-border">
                <nav class="-mb-px flex space-x-8">
                    <button type="button" onclick="switchTab('main')" id="tab-btn-main" 
                            class="border-blue-500 text-blue-500 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors">
                        메인 설정
                    </button>
                    <button type="button" onclick="switchTab('additional')" id="tab-btn-additional" 
                            class="border-transparent text-dark-muted hover:text-dark-text hover:border-dark-border whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors">
                        추가 정보
                    </button>
                </nav>
            </div>

            <!-- 메인 설정 탭 -->
            <div id="tab-content-main" class="space-y-6">

            <!-- HTML 편집 섹션 (HTML 모드일 때만 표시) -->
            <div id="section-html" class="hidden bg-dark-card rounded-xl p-6 border border-dark-border">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-white flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                        </svg>
                        HTML 템플릿 수정
                    </h2>
                    <button type="button" onclick="previewHTML()" 
                            class="px-3 py-1.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        미리보기
                    </button>
                </div>
                <div>
                    <textarea id="html_template" rows="20"
                              class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg text-white placeholder-dark-muted font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"
                              placeholder="HTML 코드를 여기에 입력하세요"></textarea>
                    <p class="mt-2 text-xs text-dark-muted">
                        &lt;html&gt; 태그를 포함한 전체 HTML 코드를 입력하세요.
                    </p>
                </div>
            </div>

            <div id="section-chart" class="space-y-6">
                <!-- Google Sheets 연동 섹션 -->
                <div class="bg-dark-card rounded-xl p-6 border border-dark-border">
                <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    Google Sheets 연동
                </h2>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-dark-text mb-1">
                                Google Sheets URL <span class="text-red-500">*</span>
                            </label>
                            <div class="flex gap-2">
                                <input type="url" id="gsheet_url" name="gsheet_url" required
                                       class="flex-1 px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                                       placeholder="https://docs.google.com/spreadsheets/d/...">
                                <button type="button" onclick="loadWorksheets()"
                                        class="px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700 transition text-xs whitespace-nowrap h-6 items-center flex">
                                    불러오기
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-dark-text mb-1">
                                시트 이름 <span class="text-red-500">*</span>
                            </label>
                            <select id="sheet_name" name="sheet_name" required
                                    class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <option value="">워크시트를 선택하세요</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-dark-text mb-1">
                                셀 범위 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="cell_range" name="cell_range" required
                                   class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                                   placeholder="예: A1:D100" value="A1:Z100">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 차트 유형 설정 섹션 -->
            <div class="bg-dark-card rounded-xl p-6 border border-dark-border">
                <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    차트 유형 설정
                </h2>
                <div>
                    <label class="block text-sm font-medium text-dark-text mb-1">
                        차트 유형 <span class="text-red-500">*</span>
                    </label>
                    <select id="chart_type" name="chart_type"
                            class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="line">선 그래프 (Line Chart)</option>
                        <option value="bar">막대 그래프 (Bar Chart)</option>
                        <option value="scatter">산점도 (Scatter Plot)</option>
                        <option value="pie">파이 차트 (Pie Chart)</option>
                        <option value="doughnut">도넛 차트 (Doughnut Chart)</option>
                        <option value="radar">레이더 차트 (Radar Chart)</option>
                        <option value="polarArea">극좌표 차트 (Polar Area)</option>
                    </select>
                </div>
            </div>

            <!-- 디자인 및 애니메이션 설정 섹션 -->
            <div class="bg-dark-card rounded-xl p-6 border border-dark-border">
                <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path>
                    </svg>
                    디자인 및 애니메이션 설정
                </h2>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            범례 위치 (Legend)
                        </label>
                        <select id="legend_position" name="legend_position"
                                class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="top">위 (Top)</option>
                            <option value="bottom" selected>아래 (Bottom)</option>
                            <option value="left">왼쪽 (Left)</option>
                            <option value="right">오른쪽 (Right)</option>
                            <option value="false">숨김 (Hidden)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            애니메이션 (ms)
                        </label>
                        <input type="number" id="animation_duration" name="animation_duration"
                               class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                               placeholder="예: 1000" value="1000">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            포인트 스타일
                        </label>
                        <select id="point_style" name="point_style"
                                class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="circle">원형 (Circle)</option>
                            <option value="rect">사각형 (Rectangle)</option>
                            <option value="rectRounded">라운드 사각형</option>
                            <option value="triangle">삼각형 (Triangle)</option>
                            <option value="cross">십자 (Cross)</option>
                            <option value="star">별 (Star)</option>
                            <option value="line">선 (Line)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            점 크기 (Radius)
                        </label>
                        <input type="number" id="point_radius" name="point_radius"
                               class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                               placeholder="예: 6" value="6">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            선 두께 (Width)
                        </label>
                        <input type="number" id="border_width" name="border_width"
                               class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                               placeholder="예: 3" value="3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            곡선 부드러움
                        </label>
                        <div class="flex items-center gap-2 h-6">
                            <input type="range" id="line_tension" name="line_tension" min="0" max="0.5" step="0.1" value="0.3"
                                   class="flex-1 h-1.5 bg-dark-bg rounded-lg appearance-none cursor-pointer border border-dark-border">
                            <span id="line_tension_val" class="text-xs text-dark-text w-6 text-right">0.3</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            채우기 (Fill)
                        </label>
                        <select id="chart_fill" name="chart_fill"
                                class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="false">없음 (None)</option>
                            <option value="origin">기준선까지 (Origin)</option>
                            <option value="start">바닥까지 (Start)</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- 그래프 제목 설정 섹션 -->
            <div class="bg-dark-card rounded-xl p-6 border border-dark-border">
                <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"></path>
                    </svg>
                    그래프 제목 설정
                </h2>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            메인 제목
                        </label>
                        <input type="text" id="main_title" name="main_title"
                               class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                               placeholder="예: 안정성 시험 결과">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-dark-text mb-1">
                            서브 제목
                        </label>
                        <input type="text" id="sub_title" name="sub_title"
                               class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                               placeholder="예: 페라스타AG">
                    </div>
                </div>
            </div>

            <!-- 축 설정 섹션 -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- X축 설정 -->
                <div class="bg-dark-card rounded-xl p-6 border border-dark-border">
                    <h2 class="text-xl font-semibold text-white mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12M8 12h12m-12 5h12"></path>
                        </svg>
                        X축 설정
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <label class="block text-sm font-medium text-dark-text mb-1">축 제목</label>
                            <input type="text" id="x_axis_title" 
                                   class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                                   placeholder="예: 경과일 (일)" value="X축">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-dark-text mb-1">스케일 유형</label>
                            <select id="x_axis_scale_type" class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <option value="category">텍스트 (Category)</option>
                                <option value="linear">숫자 (Linear)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-dark-text mb-1">눈금 간격</label>
                            <input type="number" id="x_axis_interval" 
                                   class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                                   value="10">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-dark-text mb-1">최솟값</label>
                            <input type="number" id="x_axis_min" 
                                   class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text focus:outline-none focus:ring-1 focus:ring-blue-500"
                                   value="0">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-dark-text mb-1">최댓값</label>
                            <input type="number" id="x_axis_max"

    <script>
        const testId = {{ test_id }};
        const isNewTest = testId === 0;
        let isHtmlMode = false;

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', async () => {
            if (!isNewTest) {
                await loadTestData();
            }

            // 색상 입력 동기화 - Y축 기준선
            document.getElementById('y_spec_line_color').addEventListener('input', (e) => {
                document.getElementById('y_spec_line_color_text').value = e.target.value;
            });
            document.getElementById('y_spec_line_color_text').addEventListener('input', (e) => {
                document.getElementById('y_spec_line_color').value = e.target.value;
            });
            
            // 색상 입력 동기화 - X축 기준선
            document.getElementById('x_spec_line_color').addEventListener('input', (e) => {
                document.getElementById('x_spec_line_color_text').value = e.target.value;
            });
            document.getElementById('x_spec_line_color_text').addEventListener('input', (e) => {
                document.getElementById('x_spec_line_color').value = e.target.value;
            });



            // 이미지 붙여넣기 리스너 추가
            const imageInput = document.getElementById('new_image_url');
            imageInput.addEventListener('paste', handleImagePaste);
        });
        
        // 이미지 붙여넣기 처리 핸들러
        async function handleImagePaste(event) {
            const items = (event.clipboardData || event.originalEvent.clipboardData).items;
            let file = null;

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") === 0) {
                    file = items[i].getAsFile();
                    break;
                }
            }

            if (file) {
                event.preventDefault(); // 기본 붙여넣기 동작 방지
                
                // 파일 업로드
                const formData = new FormData();
                formData.append('file', file);
                
                showLoading(true);
                try {
                    const response = await fetch('/lims/api/upload/image', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        addImageItem(result.url);
                        showToast('이미지가 업로드되었습니다.', 'success');
                    } else {
                        showToast('이미지 업로드 실패: ' + result.error, 'error');
                    }
                } catch (error) {
                    showToast('이미지 업로드 중 오류 발생: ' + error.message, 'error');
                    console.error(error);
                } finally {
                    showLoading(false);
                }
            }
        }

        // 시험 데이터 로드
        async function loadTestData() {
            showLoading(true);
            try {
                const response = await fetch(`/lims/api/tests/${testId}`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                const data = result.data;

                // 기본 정보
                document.getElementById('test_title').value = data.test_title || '';
                document.getElementById('product_name').value = data.product_name || '';

                // 데이터 모드 확인
                if (data.html_template) {
                    isHtmlMode = true;
                    // HTML 모드 UI 설정
                    document.getElementById('section-html').classList.remove('hidden');
                    document.getElementById('section-chart').classList.add('hidden');
                    
                    document.getElementById('html_template').value = data.html_template;
                    
                    // 차트 관련 필수 속성 제거
                    document.getElementById('gsheet_url').removeAttribute('required');
                    document.getElementById('sheet_name').removeAttribute('required');
                    document.getElementById('cell_range').removeAttribute('required');
                } else {
                    isHtmlMode = false;
                    // 차트 모드 UI 설정
                    document.getElementById('section-html').classList.add('hidden');
                    document.getElementById('section-chart').classList.remove('hidden');
                    
                    // 차트 관련 필수 속성 복구
                    document.getElementById('gsheet_url').setAttribute('required', '');
                    document.getElementById('sheet_name').setAttribute('required', '');
                    document.getElementById('cell_range').setAttribute('required', '');

                    // Google Sheets 정보
                    document.getElementById('gsheet_url').value = data.gsheet_url || '';
                    document.getElementById('cell_range').value = data.cell_range || 'A1:Z100';

                    // 워크시트 목록 로드 후 선택
                    if (data.gsheet_url) {
                        await loadWorksheets();
                        document.getElementById('sheet_name').value = data.sheet_name || '';
                    }

                    // 그래프 제목
                    document.getElementById('main_title').value = data.main_title || '';
                    document.getElementById('sub_title').value = data.sub_title || '';

                    // 차트 설정
                    if (data.chart_settings) {
                        const settings = data.chart_settings;

                        // 차트 유형
                        document.getElementById('chart_type').value = settings.chart_type || 'line';
                        
                        // 디자인 설정
                        document.getElementById('legend_position').value = settings.legend_position || 'bottom';
                        document.getElementById('animation_duration').value = settings.animation_duration || 1000;
                        document.getElementById('point_style').value = settings.point_style || 'rectRounded';
                        
                        const tension = settings.line_tension !== undefined ? settings.line_tension : 0.3;
                        document.getElementById('line_tension').value = tension;
                        document.getElementById('line_tension_val').textContent = tension;

                        // 채우기 설정
                        const fillVal = settings.fill !== undefined ? String(settings.fill) : 'false';
                        document.getElementById('chart_fill').value = fillVal;

                        // X축
                        if (settings.x_axis) {
                            document.getElementById('x_axis_title').value = settings.x_axis.title || 'X축';
                            document.getElementById('x_axis_min').value = settings.x_axis.min || 0;
                            document.getElementById('x_axis_max').value = settings.x_axis.max || 100;
                            document.getElementById('x_axis_interval').value = settings.x_axis.interval || 10;
                            document.getElementById('x_axis_show_grid').checked = settings.x_axis.show_grid !== false;
                            document.getElementById('x_axis_scale_type').value = settings.x_axis.scale_type || 'category';
                        }

                        // Y축
                        if (settings.y_axis) {
                            document.getElementById('y_axis_title').value = settings.y_axis.title || 'Y축';
                            document.getElementById('y_axis_min').value = settings.y_axis.min || 0;
                            document.getElementById('y_axis_max').value = settings.y_axis.max || 100;
                            document.getElementById('y_axis_interval').value = settings.y_axis.interval || 10;
                            document.getElementById('y_axis_show_grid').checked = settings.y_axis.show_grid !== false;
                        }

                        // Y축 기준선 (하위 호환성: spec_line도 지원)
                        const ySpecLine = settings.y_spec_line || settings.spec_line;
                        if (ySpecLine) {
                            document.getElementById('y_spec_line_show').checked = ySpecLine.show !== false;
                            document.getElementById('y_spec_line_value').value = ySpecLine.value || 90;
                            document.getElementById('y_spec_line_color').value = ySpecLine.color || '#ff0000';
                            document.getElementById('y_spec_line_color_text').value = ySpecLine.color || '#ff0000';
                            document.getElementById('y_spec_line_label').value = ySpecLine.label || 'Y 기준선';
                        }
                        
                        // X축 기준선
                        if (settings.x_spec_line) {
                            document.getElementById('x_spec_line_show').checked = settings.x_spec_line.show !== false;
                            document.getElementById('x_spec_line_value').value = settings.x_spec_line.value || 50;
                            document.getElementById('x_spec_line_color').value = settings.x_spec_line.color || '#00ff00';
                            document.getElementById('x_spec_line_color_text').value = settings.x_spec_line.color || '#00ff00';
                            document.getElementById('x_spec_line_label').value = settings.x_spec_line.label || 'X 기준선';
                        }
                    }
                }

                // 추가 정보 로드
                document.getElementById('test_summary').value = data.test_summary || '';
                if (data.start_month) document.getElementById('start_month').value = data.start_month;
                if (data.end_month) document.getElementById('end_month').value = data.end_month;
                
                // 제형 정보 모드 감지 (JSON 배열이면 테이블 모드)
                const formulationInfo = data.formulation_info || '';
                let isTableMode = false;
                
                try {
                    const parsed = JSON.parse(formulationInfo);
                    if (Array.isArray(parsed) && parsed.length > 0 && typeof parsed[0] === 'object') {
                        isTableMode = true;
                        parsed.forEach(item => {
                            // key-value pair 찾기 (item: "항목", content: "내용" 형태 가정)
                            const itemKey = item.item || Object.keys(item)[0] || '';
                            const contentValue = item.content || Object.values(item)[0] || '';
                            addFormulationRow(itemKey, contentValue);
                        });
                    }
                } catch (e) {
                    // JSON 파싱 실패 시 일반 텍스트로 처리
                     isTableMode = false;
                }

                if (isTableMode) {
                    toggleFormulationMode('table');
                } else {
                    document.getElementById('formulation_info').value = formulationInfo;
                    toggleFormulationMode('text');
                }
                
                // 이미지 리스트 복원
                if (data.image_urls && Array.isArray(data.image_urls)) {
                    data.image_urls.forEach(url => addImageItem(url));
                }
                
                // 링크 리스트 복원
                if (data.reference_links && Array.isArray(data.reference_links)) {
                    data.reference_links.forEach(link => addLinkItem(link.title, link.url));
                }

                document.getElementById('page-title').textContent = '시험 설정 편집';
            } catch (error) {
                showToast('시험 데이터 로드 실패: ' + error.message, 'error');
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        // 워크시트 목록 로드
        async function loadWorksheets() {
            const url = document.getElementById('gsheet_url').value.trim();
            if (!url) {
                showToast('Google Sheets URL을 입력해주세요.', 'info');
                return;
            }

            showLoading(true);
            try {
                const response = await fetch('/lims/api/gsheet/worksheets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gsheet_url: url })
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                const select = document.getElementById('sheet_name');
                select.innerHTML = '<option value="">워크시트를 선택하세요</option>';

                result.data.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    select.appendChild(option);
                });

                // 첫 번째 워크시트 자동 선택
                if (result.data.length > 0) {
                    select.value = result.data[0];
                }

                showToast('워크시트 목록을 불러왔습니다.', 'success');
            } catch (error) {
                showToast('워크시트 목록 로드 실패: ' + error.message, 'error');
                console.error(error);
            } finally {
                showLoading(false);
            }
        }
        
        // Line Tension Slider Update
        document.getElementById('line_tension').addEventListener('input', function(e) {
            document.getElementById('line_tension_val').textContent = e.target.value;
        });

        // 미리보기
        function previewHTML() {
            const html = document.getElementById('html_template').value;
            if (!html.trim()) {
                showToast('HTML 템플릿을 입력해주세요.', 'info');
                return;
            }
            const win = window.open('', '_blank', 'width=1200,height=800');
            win.document.write(html);
            win.document.close();
        }

        // 시험 저장
        async function saveTest() {
            // 폼 검증
            const form = document.getElementById('test-form');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // 공통 데이터 수집
            const data = {
                test_title: document.getElementById('test_title').value,
                product_name: document.getElementById('product_name').value,
                test_summary: document.getElementById('test_summary').value,
                formulation_info: document.getElementById('formulation_info').value,
                image_urls: getImageUrls(),
                reference_links: getReferenceLinks(),
                start_month: document.getElementById('start_month').value,
                end_month: document.getElementById('end_month').value
            };

            if (isHtmlMode) {
                // HTML 데이터 수집
                const html = document.getElementById('html_template').value;
                if (!html.trim()) {
                    showToast('HTML 템플릿을 입력해주세요.', 'error');
                    return;
                }
                data.html_template = html;
            } else {
                // 차트 데이터 수집
                data.gsheet_url = document.getElementById('gsheet_url').value;
                data.sheet_name = document.getElementById('sheet_name').value;
                data.cell_range = document.getElementById('cell_range').value;
                data.main_title = document.getElementById('main_title').value;
                data.sub_title = document.getElementById('sub_title').value;
                data.chart_settings = {
                    chart_type: document.getElementById('chart_type').value,
                    // 디자인 설정
                    legend_position: document.getElementById('legend_position').value,
                    animation_duration: parseInt(document.getElementById('animation_duration').value) || 1000,
                    point_style: document.getElementById('point_style').value,
                    line_tension: parseFloat(document.getElementById('line_tension').value) || 0.1,
                    fill: document.getElementById('chart_fill').value === 'true' ? true : (document.getElementById('chart_fill').value === 'false' ? false : document.getElementById('chart_fill').value),
                    
                    x_axis: {
                        title: document.getElementById('x_axis_title').value,
                        min: parseFloat(document.getElementById('x_axis_min').value),
                        max: parseFloat(document.getElementById('x_axis_max').value),
                        interval: parseFloat(document.getElementById('x_axis_interval').value),
                        show_grid: document.getElementById('x_axis_show_grid').checked,
                        scale_type: document.getElementById('x_axis_scale_type').value
                    },
                    y_axis: {
                        title: document.getElementById('y_axis_title').value,
                        min: parseFloat(document.getElementById('y_axis_min').value),
                        max: parseFloat(document.getElementById('y_axis_max').value),
                        interval: parseFloat(document.getElementById('y_axis_interval').value),
                        show_grid: document.getElementById('y_axis_show_grid').checked
                    },
                    y_spec_line: {
                        show: document.getElementById('y_spec_line_show').checked,
                        value: parseFloat(document.getElementById('y_spec_line_value').value),
                        color: document.getElementById('y_spec_line_color').value,
                        label: document.getElementById('y_spec_line_label').value
                    },
                    x_spec_line: {
                        show: document.getElementById('x_spec_line_show').checked,
                        value: parseFloat(document.getElementById('x_spec_line_value').value),
                        color: document.getElementById('x_spec_line_color').value,
                        label: document.getElementById('x_spec_line_label').value
                    }
                };
            }

            // Formulation Info (모드에 따라 수집)
            if (currentFormulationMode === 'table') {
                const rows = document.querySelectorAll('#formulation-table-body tr');
                const list = [];
                rows.forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    if (inputs[0].value.trim() || inputs[1].value.trim()) {
                        list.push({
                            item: inputs[0].value.trim(),
                            content: inputs[1].value.trim()
                        });
                    }
                });
                data.formulation_info = list.length > 0 ? JSON.stringify(list) : null;
            } else {
                 data.formulation_info = document.getElementById('formulation_info').value.trim() || null;
            }

            showLoading(true);
            try {
                const url = isNewTest ? '/lims/api/tests' : `/lims/api/tests/${testId}`;
                const method = isNewTest ? 'POST' : 'PUT';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error);
                }

                showToast(result.message, 'success');
                
                // 저장 성공 후 이전 페이지로 이동
                // Dashboard가 상태를 기억하므로 바로 이동해도 안전함
                setTimeout(() => {
                    const referrer = document.referrer;
                    // 편집 페이지 내부 이동이 아니고, 유효한 referrer가 있으면 거기로 이동
                    if (referrer && referrer.indexOf('/edit/') === -1) {
                         window.location.href = referrer;
                    } else {
                        // 기본값: 대시보드
                        window.location.href = '/lims';
                    }
                }, 300);
            } catch (error) {
                showToast('저장 실패: ' + error.message, 'error');
                console.error(error);
            } finally {
                showLoading(false);
            }
        }

        // 로딩 표시
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.remove('hidden');
            } else {
                loading.classList.add('hidden');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
            toast.innerHTML = `
                <span style="font-size: 20px; font-weight: bold;">${icon}</span>
                <span style="flex: 1;">${message}</span>
            `;
            
            container.appendChild(toast);
            
            // 3초 후 자동 제거
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => {
                    container.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 이미지 관리 함수
        function addImage() {
            const input = document.getElementById('new_image_url');
            const url = input.value.trim();
            if (!url) return;
            
            addImageItem(url);
            input.value = '';
        }

        function addImageItem(url) {
            const list = document.getElementById('image_list');
            const li = document.createElement('li');
            li.className = 'flex items-center justify-between bg-dark-bg p-2 rounded border border-dark-border';
            li.dataset.url = url;
            li.innerHTML = `
                <span class="text-sm text-dark-text truncate flex-1 mr-2">${url}</span>
                <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            list.appendChild(li);
        }

        function getImageUrls() {
            const list = document.getElementById('image_list');
            return Array.from(list.children).map(li => li.dataset.url);
        }

        // 링크 관리 함수
        function addLink() {
            const titleInput = document.getElementById('new_link_title');
            const urlInput = document.getElementById('new_link_url');
            const title = titleInput.value.trim();
            const url = urlInput.value.trim();
            
            if (!title || !url) {
                showToast('제목과 URL을 모두 입력해주세요.', 'info');
                return;
            }
            
            addLinkItem(title, url);
            titleInput.value = '';
            urlInput.value = '';
        }

        function addLinkItem(title, url) {
            const list = document.getElementById('link_list');
            const li = document.createElement('li');
            li.className = 'flex items-center justify-between bg-dark-bg p-2 rounded border border-dark-border';
            li.dataset.title = title;
            li.dataset.url = url;
            li.innerHTML = `
                <div class="flex items-center gap-2 truncate flex-1 mr-2">
                    <span class="text-sm font-medium text-white">${title}</span>
                    <span class="text-xs text-dark-muted truncate">${url}</span>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;
            list.appendChild(li);
        }

        function getReferenceLinks() {
            const list = document.getElementById('link_list');
            return Array.from(list.children).map(li => ({
                title: li.dataset.title,
                url: li.dataset.url
            }));
        }
        // 제형 정보 모드 토글
        let currentFormulationMode = 'text';
        function toggleFormulationMode(mode) {
            currentFormulationMode = mode;
            const textContainer = document.getElementById('formulation-text-container');
            const tableContainer = document.getElementById('formulation-table-container');
            const btnText = document.getElementById('btn-mode-text');
            const btnTable = document.getElementById('btn-mode-table');

            if (mode === 'text' || mode === undefined) {
                currentFormulationMode = 'text';
                textContainer.classList.remove('hidden');
                tableContainer.classList.add('hidden');
                document.getElementById('formulation-markdown-hint').classList.remove('hidden'); // Show markdown hint
                btnText.className = 'px-2 py-1 text-xs bg-blue-600 text-white rounded transition-colors';
                btnTable.className = 'px-2 py-1 text-xs bg-dark-card border border-dark-border text-dark-muted rounded transition-colors';
            } else {
                currentFormulationMode = 'table';
                textContainer.classList.add('hidden');
                tableContainer.classList.remove('hidden');
                document.getElementById('formulation-markdown-hint').classList.add('hidden'); // Hide markdown hint
                btnText.className = 'px-2 py-1 text-xs bg-dark-card border border-dark-border text-dark-muted rounded transition-colors';
                btnTable.className = 'px-2 py-1 text-xs bg-blue-600 text-white rounded transition-colors';
                
                // 테이블이 비어있으면 초기 행 추가
                if (document.getElementById('formulation-table-body').children.length === 0) {
                    addFormulationRow();
                }
            }
        }

        // 제형 정보 테이블 행 추가
        function addFormulationRow(item = '', content = '') {
            const tbody = document.getElementById('formulation-table-body');
            const row = document.createElement('tr');
            row.className = 'bg-dark-card border-b border-dark-border hover:bg-dark-border/50 transition-colors';
            row.innerHTML = `
                <td class="px-4 py-2">
                    <input type="text" value="${item.replace(/"/g, '&quot;')}" class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="항목">
                </td>
                <td class="px-4 py-2">
                    <input type="text" value="${content.replace(/"/g, '&quot;')}" class="w-full px-2 py-1 bg-dark-bg border border-dark-border rounded text-dark-text text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="내용">
                </td>
                <td class="px-4 py-2 text-center">
                    <button type="button" onclick="this.closest('tr').remove()" class="text-red-400 hover:text-red-300 transition">
                        <svg class="w-4 h-4 ml-auto mr-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </td>
            `;
            tbody.appendChild(row);
        }
        // 탭 전환 함수
        function switchTab(tabName) {
            const mainBtn = document.getElementById('tab-btn-main');
            const addBtn = document.getElementById('tab-btn-additional');
            const mainContent = document.getElementById('tab-content-main');
            const addContent = document.getElementById('tab-content-additional');

            if (tabName === 'main') {
                mainBtn.classList.add('border-blue-500', 'text-blue-500');
                mainBtn.classList.remove('border-transparent', 'text-dark-muted');
                addBtn.classList.remove('border-blue-500', 'text-blue-500');
                addBtn.classList.add('border-transparent', 'text-dark-muted');
                
                mainContent.classList.remove('hidden');
                addContent.classList.add('hidden');
            } else {
                addBtn.classList.add('border-blue-500', 'text-blue-500');
                addBtn.classList.remove('border-transparent', 'text-dark-muted');
                mainBtn.classList.remove('border-blue-500', 'text-blue-500');
                mainBtn.classList.add('border-transparent', 'text-dark-muted');
                
                mainContent.classList.add('hidden');
                addContent.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
