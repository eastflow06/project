<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Purpose Analysis</title>
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
    <style>
        /* =========================================
           1. CSS 변수 및 다크모드 설정 (card.css 기반)
           ========================================= */
        :root {
            /* 공통 색상 */
            --bg-color: #f0f2f5;
            --text-color: #333333;
            --accent-color: #1175e1;
            --border-color: #ddd;
            
            /* 컨테이너 배경 */
            --container-bg: #ffffff;
            
            /* 입력 필드 */
            --input-bg: #ffffff;
            --input-border: #ddd;
            --input-text: #333333;

            /* 차트 배경 (Plotly용) */
            --chart-bg: #ffffff;
            --chart-text: #333333;
        }

        body.dark-mode {
            /* 다크모드 색상 재정의 */
            --bg-color: #222222;
            --text-color: #e0e0e0;
            
            --container-bg: #2c2c2c;
            --border-color: #444;
            
            --input-bg: #3a3a3a;
            --input-border: #555;
            --input-text: #e0e0e0;

            /* 차트 배경 (Plotly용) */
            --chart-bg: #2c2c2c;
            --chart-text: #e0e0e0;
        }

        /* =========================================
           2. 기본 레이아웃
           ========================================= */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--container-bg);
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--text-color);
        }

        .select-container {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            outline: none;
        }

        #total-amount {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            color: var(--text-color);
        }

        /* 테마 토글 버튼 스타일 */
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
            transition: all 0.3s ease;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div class="container">
        <h1>월별 목적별 지출 분석</h1>
        <div class="select-container">
            <label for="monthSelect">월 선택:</label>
            <select id="monthSelect" onchange="updateChart()"></select>
        </div>
        <div id="total-amount"></div>
        <div id="donut-chart"></div>
    </div>

    <script>
        // Initialize data from Flask
        const chartData = {{ chart_data | tojson | safe }};
        const selectedMonthFromUrl = {{ selected_month | tojson | safe }};
        const defaultMonth = {{ default_month | tojson | safe }};
        
        const monthSelect = document.getElementById('monthSelect');
        let showPercentage = false;
    
        // 목적별 색상표
        const purposeColors = {
            '회의비(식비)': '#FF0000',
            '회의비(다과)': '#FFB6C1',
            '수용비': '#FFD700',
            '숙박비': '#8B00FF',
            '차량유지비': '#2E64FE',
            '교통비': '#90EE90'
        };
        
        // 밝은 색상인지 판별하는 함수 (텍스트 색상 결정용)
        function isLightColor(hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5;
        }
        
        function getTextColor(backgroundColor) {
            return isLightColor(backgroundColor) ? '#333333' : '#FFFFFF';
        }
        
        // 월 선택 옵션 생성
        chartData.months.forEach(month => {
            const option = document.createElement('option');
            option.value = month;
            option.textContent = month;
            if (selectedMonthFromUrl && month === selectedMonthFromUrl) {
                option.selected = true;
            }
            monthSelect.appendChild(option);
        });
        
        if (!selectedMonthFromUrl && defaultMonth) {
            monthSelect.value = defaultMonth;
        }
    
        // ==========================================
        // [중요] 다크모드 토글 및 차트 업데이트 로직
        // ==========================================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            const isDark = document.body.classList.contains('dark-mode');
            
            btn.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // ★ 테마가 바뀔 때마다 차트를 새로 그려서 색상을 반영합니다.
            updateChart();
        }
    
        // 초기 로딩 시 테마 확인
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                const btn = document.getElementById('themeBtn');
                if(btn) btn.textContent = '☀️';
            }
            // 초기 차트 그리기
            if (chartData.months.length > 0) {
                updateChart();
            }
        });
        
        function updateChart() {
            const selectedMonth = monthSelect.value;
            const monthIndex = chartData.months.indexOf(selectedMonth);
            
            // ★ 현재 다크모드 상태 확인
            const isDark = document.body.classList.contains('dark-mode');
            
            // ★ 다크모드 여부에 따른 차트 색상 설정 (CSS 변수와 일치시킴)
            // 다크모드일 때 배경: #2c2c2c (card.css의 --container-bg), 글자: #e0e0e0
            const currentBgColor = isDark ? '#2c2c2c' : '#ffffff';
            const currentTextColor = isDark ? '#e0e0e0' : '#333333';
    
            const values = [];
            const labels = [];
            const colors = [];
            const textColors = [];
            
            for (const [purpose, amounts] of Object.entries(chartData.purpose_data)) {
                const amount = amounts[monthIndex];
                if (amount > 0) {
                    values.push(amount);
                    labels.push(purpose);
                    const color = purposeColors[purpose] || '#CCCCCC';
                    colors.push(color);
                    textColors.push(getTextColor(color));
                }
            }
    
            const totalAmount = values.reduce((a, b) => a + b, 0);
            document.getElementById('total-amount').textContent = 
                `월별 소계: ${totalAmount.toLocaleString()}원`;
            
            const data = [{
                type: 'pie',
                values: values,
                labels: labels,
                hole: 0.4,
                textinfo: showPercentage ? 'label+percent' : 'label+value',
                texttemplate: showPercentage ? 
                    '%{label}<br>%{percent}' : 
                    '%{label}<br>%{value:,.0f}원',
                insidetextorientation: 'radial',
                hovertemplate: '%{label}<br>금액: %{value:,.0f}원<br>비율: %{percent}<extra></extra>',
                textfont: {
                    size: 18,
                    color: textColors,
                    family: 'Arial'
                },
                hoverfont: {
                    size: 20,
                    color: textColors,
                    family: 'Arial'
                },
                marker: {
                    colors: colors,
                    line: {
                        color: isDark ? '#444' : '#fff', // 도넛 조각 테두리 색상
                        width: 1
                    }
                }
            }];
            
            const layout = {
                title: {
                    text: `${selectedMonth} 목적별 사용분포`,
                    font: {
                        size: 24,
                        color: currentTextColor, // ★ 제목 글자색 적용
                        family: 'Arial'
                    }
                },
                font: {
                    family: 'Arial',
                    color: currentTextColor // ★ 전체 글자색 적용
                },
                // ★ 여기가 핵심입니다: 차트의 배경색을 직접 지정
                paper_bgcolor: currentBgColor, 
                plot_bgcolor: currentBgColor,
                
                height: 600,
                showlegend: true,
                legend: {
                    orientation: 'h',
                    y: -0.1,
                    font: {
                        color: currentTextColor // ★ 범례 글자색 적용
                    }
                }
            };
    
            const config = {
                displayModeBar: false,
                responsive: true
            };
            
            Plotly.newPlot('donut-chart', data, layout, config);
    
            // 클릭 이벤트 유지
            document.getElementById('donut-chart').removeAllListeners('plotly_click'); // 중복 방지
            document.getElementById('donut-chart').on('plotly_click', function() {
                showPercentage = !showPercentage;
                updateChart();
            });
        }
    </script>
</body>
</html>
