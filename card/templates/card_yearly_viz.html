<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연도별 목적별 지출 분석</title>
    <script src="https://cdn.plot.ly/plotly-2.20.0.min.js"></script>
    <style>
        /* =========================================
           1. CSS 변수 및 다크모드 설정
           ========================================= */
        :root {
            /* 공통 색상 (라이트 모드) */
            --bg-color: #f0f2f5;
            --text-color: #333333;
            
            /* 컨테이너 및 요소 배경 */
            --container-bg: #ffffff;
            --input-bg: #ffffff;
            --input-border: #ddd;
            --input-text: #333333;
            
            /* 버튼 */
            --btn-bg: #4CAF50;
            --btn-hover: #45a049;
            --btn-text: #ffffff;
        }

        body.dark-mode {
            /* 다크모드 색상 재정의 */
            --bg-color: #222222;
            --text-color: #e0e0e0;
            
            --container-bg: #2c2c2c;
            --input-bg: #3a3a3a;
            --input-border: #555;
            --input-text: #e0e0e0;
            
            /* 다크모드에서 버튼 색상은 그대로 유지하거나 약간 조정 */
        }

        /* =========================================
           2. 기본 레이아웃 스타일
           ========================================= */
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--container-bg);
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            min-height: 100vh;
            transition: background-color 0.3s;
        }

        h1 {
            color: var(--text-color);
        }

        .select-container {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        select {
            padding: 8px;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--input-border);
            border-radius: 4px;
        }

        #total-amount {
            font-size: 18px;
            font-weight: bold;
            margin: 20px 0;
            color: var(--text-color);
        }

        .toggle-btn {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .toggle-btn:hover {
            background-color: var(--btn-hover);
        }

        /* 테마 토글 버튼 (우측 상단) */
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--container-bg);
            border: 1px solid var(--input-border);
            color: var(--text-color);
            cursor: pointer;
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
            transition: all 0.3s ease;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div class="container">
        <h1>연도별 목적별 지출 분석</h1>
        <div class="select-container">
            <label for="yearSelect">연도 선택:</label>
            <select id="yearSelect"></select>
            <button id="toggleBtn" class="toggle-btn">금액/비율 전환</button>
        </div>
        <div id="total-amount"></div>
        <div id="bar-chart"></div>
    </div>

    <script>
        // Monthly viz URL from Flask
        const monthlyVizUrl = "{{ url_for('card_monthly_viz_route') }}";
        
        // Initialize data from Flask
        const chartData = {{ chart_data | tojson | safe }};
        console.log('Received chart data:', chartData);
        
        let showPercentage = false;

        // Purpose colors
        const purposeColors = {
            '회의비(식비)': '#FF0000',
            '회의비(다과)': '#FFB6C1',
            '수용비': '#FFD700',
            '숙박비': '#8B00FF',
            '차량유지비': '#2E64FE',
            '교통비': '#90EE90'
        };

        const yearSelect = document.getElementById('yearSelect');
        if (chartData.years && chartData.years.length > 0) {
            chartData.years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });
        }

        document.getElementById('toggleBtn').addEventListener('click', () => {
            showPercentage = !showPercentage;
            updateChart();
        });

        yearSelect.addEventListener('change', updateChart);

        // ==========================================
        // 1. 다크모드 토글 및 저장 로직
        // ==========================================
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const btn = document.getElementById('themeBtn');
            const isDark = document.body.classList.contains('dark-mode');
            
            if(btn) btn.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // 차트 색상 업데이트
            updateChart();
        }

        // 페이지 로드 시 테마 복원
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const btn = document.getElementById('themeBtn');
            
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                if(btn) btn.textContent = '☀️';
            } else {
                if(btn) btn.textContent = '🌙';
            }
            
            // 초기 차트 그리기
            if (chartData.years && chartData.years.length > 0) {
                updateChart();
            } else {
                document.getElementById('bar-chart').innerHTML = '데이터를 불러올 수 없습니다.';
            }
        });

        function calculateMonthlyTotals(selectedYear) {
            const monthlyTotals = Array(12).fill(0);
            if (!chartData.monthly_data || !chartData.monthly_data[selectedYear]) {
                return monthlyTotals;
            }
            chartData.purposes.forEach(purpose => {
                const monthlyData = chartData.monthly_data[selectedYear][purpose] || Array(12).fill(0);
                monthlyData.forEach((amount, idx) => {
                    monthlyTotals[idx] += (typeof amount === 'number' ? amount : 0);
                });
            });
            return monthlyTotals;
        }

        // ==========================================
        // 2. 차트 업데이트 (다크모드 지원)
        // ==========================================
        function updateChart() {
            if (!yearSelect.value) return;
            
            const selectedYear = yearSelect.value;
            const monthLabels = ['1월', '2월', '3월', '4월', '5월', '6월', 
                               '7월', '8월', '9월', '10월', '11월', '12월'];

            // ★ 다크모드 색상 결정
            const isDark = document.body.classList.contains('dark-mode');
            const currentBgColor = isDark ? '#2c2c2c' : '#ffffff';
            const currentTextColor = isDark ? '#e0e0e0' : '#333333';
            const currentGridColor = isDark ? '#444444' : '#eeeeee'; // 그리드 라인 색상

            try {
                const monthlyTotals = calculateMonthlyTotals(selectedYear);

                const traces = chartData.purposes.map(purpose => {
                    const monthlyData = chartData.monthly_data[selectedYear][purpose] || Array(12).fill(0);
                    const yValues = monthlyData.map((amount, idx) => {
                        if (showPercentage) {
                            return monthlyTotals[idx] ? (amount / monthlyTotals[idx] * 100) : 0;
                        }
                        return amount;
                    });

                    return {
                        name: purpose,
                        type: 'bar',
                        x: monthLabels,
                        y: yValues,
                        marker: { color: purposeColors[purpose] || '#CCCCCC' },
                        text: null,
                        hovertemplate: showPercentage ?
                            '%{fullData.name}<br>%{y:.1f}%<extra></extra>' :
                            '%{fullData.name}<br>%{y:,.0f}원<extra></extra>'
                    };
                });

                const yearlyTotal = monthlyTotals.reduce((sum, val) => sum + val, 0);
                document.getElementById('total-amount').textContent = 
                    `${selectedYear}년 총액: ${yearlyTotal.toLocaleString()}원`;

                const annotations = monthlyTotals.map((total, idx) => ({
                    x: monthLabels[idx],
                    y: showPercentage ? 105 : total,
                    text: `${total.toLocaleString()}원`,
                    showarrow: false,
                    yshift: 20,
                    font: { 
                        size: 13,
                        weight: 'bold',
                        color: currentTextColor // ★ 애노테이션 텍스트 색상 적용
                    }
                }));

                const layout = {
                    title: {
                        text: `${selectedYear}년 월별 목적별 ${showPercentage ? '비율' : '지출'}`,
                        font: { color: currentTextColor } // ★ 제목 색상
                    },
                    barmode: 'stack',
                    height: 700,
                    width: 1100,
                    // ★ 배경색 적용
                    paper_bgcolor: currentBgColor,
                    plot_bgcolor: currentBgColor,
                    showlegend: true,
                    legend: {
                        orientation: 'h',
                        y: -0.2,
                        font: { color: currentTextColor } // ★ 범례 색상
                    },
                    xaxis: {
                        tickfont: { color: currentTextColor }, // ★ X축 폰트 색상
                        gridcolor: currentGridColor,           // ★ X축 그리드 색상
                        zerolinecolor: currentGridColor
                    },
                    yaxis: {
                        title: showPercentage ? '비율 (%)' : '금액 (원)',
                        titlefont: { color: currentTextColor }, // ★ Y축 제목 색상
                        tickfont: { color: currentTextColor },  // ★ Y축 폰트 색상
                        gridcolor: currentGridColor,            // ★ Y축 그리드 색상
                        zerolinecolor: currentGridColor,
                        tickformat: showPercentage ? ',.1f' : ',d',
                        range: showPercentage ? [0, 110] : undefined
                    },
                    font: {
                        size: 14,
                        color: currentTextColor,
                        family: 'Arial'
                    },
                    annotations: annotations
                };

                const config = {
                    displayModeBar: false,
                    responsive: true,
                    doubleClick: false
                };

                // 차트 그리기
                Plotly.newPlot('bar-chart', traces, layout, config);

                // 더블클릭 이벤트 재설정
                const chartDiv = document.getElementById('bar-chart');
                chartDiv.removeAllListeners('plotly_doubleclick'); // 중복 방지
                chartDiv.on('plotly_doubleclick', (eventData) => {
                    if (eventData && eventData.points && eventData.points[0]) {
                        const monthIndex = monthLabels.indexOf(eventData.points[0].x);
                        if (monthIndex !== -1) {
                            const month = (monthIndex + 1).toString().padStart(2, '0');
                            const yearMonth = `${selectedYear}-${month}`;
                            // Flask route URL + 쿼리 스트링
                            window.location.href = monthlyVizUrl + "?month=" + yearMonth;
                        }
                    }
                });

            } catch (error) {
                console.error('Error updating chart:', error);
                document.getElementById('bar-chart').innerHTML = 
                    '차트 업데이트 중 오류가 발생했습니다: ' + error.message;
            }
        }
    </script>
</body>
</html>
