{% extends "base.html" %}
{% block content %}
<div class="modern-container" style="max-width: 600px;">
    <div class="header-section">
        <h1 class="title">
            <i class="fas fa-link"></i>
            Edit Link
        </h1>
    </div>

    <div class="form-card">
        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="url">
                    <i class="fas fa-globe"></i> URL
                </label>
                <input type="url" id="url" name="url" class="form-input" value="{{ link.url }}" required placeholder="https://example.com">
            </div>

            <div class="form-group">
                <label class="form-label" for="description">
                    <i class="fas fa-align-left"></i> Description
                </label>
                <input type="text" id="description" name="description" class="form-input" value="{{ link.description }}" required placeholder="Enter link description">
            </div>

            <div class="btn-group-right">
                <a href="{{ url_for('project', project_id=link.project_id) }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i>&nbsp; Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i>&nbsp; Update Link
                </button>
            </div>
        </form>
    </div>

    <div class="form-card" style="border-left: 3px solid var(--danger-color);">
        <h3 style="margin-bottom: 15px; color: var(--danger-color);">
            <i class="fas fa-exclamation-triangle"></i> Danger Zone
        </h3>
        <p style="margin-bottom: 15px; color: var(--secondary-text);">
            Once you delete this link, there is no going back.
        </p>
        <form method="POST" action="{{ url_for('delete_link', link_id=link.id) }}">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this link?');">
                <i class="fas fa-trash"></i>&nbsp; Delete Link
            </button>
        </form>
    </div>
</div>
{% endblock %}
