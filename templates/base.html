<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{% block title %}Project Manager{% endblock %}</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#1976d2">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    
    <!-- Apple Web App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Todo">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        main {
            padding-top: 45px;
        }

        @media screen and (max-width: 768px) {
            html, body {
                font-size: 16px;
            }
            body, p, span, div, a, li, td, th {
                font-size: 1.3rem !important;
                line-height: 1.6;
            }
            input, select, textarea, button {
                font-size: 1.3rem !important;
            }
            .navbar a {
                font-size: 1.2rem !important;
                padding: 8px 5px;
            }
        }
        
        /* Dropdown */
        #navDropdown:hover .dropdown-menu {
            display: none;
        }
        #navDropdown .dropdown-menu.show {
            display: block;
        }
        .dropdown-menu a {
            padding: 5px 14px !important;
            font-size: 1rem !important;
            line-height: 1.4 !important;
        }
        .dropdown-menu a.kb-focus {
            background-color: rgba(25, 118, 210, 0.15);
            outline: none;
        }
        .dark-mode .dropdown-menu a.kb-focus {
            background-color: rgba(100, 180, 255, 0.2);
        }

        /* Flip Clock */
        .flip-clock-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 6px;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .flip-clock-date {
            font-size: 15px;
            font-weight: 700;
            color: #ccc;
        }
        .dark-mode .flip-clock-date { color: #aab; }

        .flip-clock {
            display: inline-flex;
            align-items: baseline;
            font-size: 15px;
            font-weight: 700;
            color: #e0e0e0;
        }
        .dark-mode .flip-clock { color: #c0c8d8; }

        .flip-clock .colon {
            margin: 0 1px;
            opacity: 0.5;
        }
        .flip-digit {
            display: inline-block;
            position: relative;
            overflow: hidden;
            height: 1.3em;
            width: 0.62em;
            text-align: center;
            vertical-align: top;
        }
        .flip-digit .digit-current {
            display: block;
        }
        .flip-digit .digit-next {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
        }
        .flip-digit.flipping .digit-current {
            animation: digitOut 0.4s ease-in forwards;
        }
        .flip-digit.flipping .digit-next {
            animation: digitIn 0.4s ease-out forwards;
        }
        @keyframes digitOut {
            0%   { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120%); opacity: 0; }
        }
        @keyframes digitIn {
            0%   { transform: translateY(0); opacity: 0; }
            100% { transform: translateY(-100%); opacity: 1; }
        }
    </style>

    <link rel="icon" type="image/gif" href="{{ url_for('static', filename='icons/favicon.gif') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightBlock(block);
            });
        });
    </script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(registration => {
                        console.log('Service Worker registered:', registration);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</head>

<body>
    <script>
        (function () {
            var savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>

<nav class="navbar">
        <div style="display: flex; align-items: center; height: 100%;">
            <a href="{{ url_for('index') }}" title="홈"><i class="fas fa-home"></i></a>
            <a href="{{ url_for('search_memos') }}" title="메모 검색"><i class="fas fa-file-alt"></i></a>
            <a href="{{ url_for('dashboard.index') }}" title="대시보드"><i class="fas fa-pen-nib"></i></a>
            <a href="{{ url_for('todo.index') }}" title="할 일 목록"><i class="fas fa-check-square"></i></a>
            <a href="{{ url_for('infolinks') }}" title="링크 모음"><i class="fas fa-link"></i></a>
            <a href="{{ url_for('smemo') }}" title="Smemo"><i class="fas fa-sticky-note"></i></a>

            <a href="{{ url_for('add_memo_mobile') }}" title="메모 추가">
                <i class="fas fa-plus-circle"></i>
            </a>

            <div class="dropdown" id="navDropdown">
                <a href="#" class="dropdown-toggle" title="더 보기">
                    <i class="fas fa-bars"></i>
                </a>

                <div class="dropdown-menu">
                    <a href="{{ url_for('statistics') }}">Statistics</a>
                    <a href="{{ url_for('summary') }}">Summary</a>
                    <a href="{{ url_for('image_upload_gallery') }}">Gallery</a>
                    <a href="{{ url_for('contact.index') }}">Contacts</a>
                    <a href="{{ url_for('note.list_notes') }}">Notes</a>
                    <a href="{{ url_for('projects') }}">Projects</a>
                    <a href="{{ url_for('product_list') }}">Products</a>
                    <a href="{{ url_for('card_index_route') }}" target="_blank">Card</a>
                    <a href="{{ url_for('manage_tags') }}">Tags</a>
                    <a href="{{ url_for('all_tasks') }}">Tasks</a>
                    <a href="{{ url_for('tasks_timeline') }}">📊 Timeline</a>
                    <a href="{{ url_for('flowchart.index') }}">Flowchart</a>
                    <a href="{{ url_for('search') }}">Search</a>
                    <a href="{{ url_for('lims.dashboard') }}">🔬 LIMS</a>
                    <a href="{{ url_for('admin_settings') }}">Settings</a>
                    <a href="{{ url_for('auth.logout') }}">Logout</a>
                </div>
            </div>
        </div>

        <div class="nav-search-form" style="margin: 0; flex-grow: 1; max-width: 250px;">
            <form method="GET" action="{{ url_for('search') }}"
                style="display: flex; align-items: center; width: 100%; margin: 0;">
                <input type="text" name="keyword" placeholder="검색" required>
                <button type="submit" title="검색">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>

        <div style="display: flex; align-items: center;">
            <div class="flip-clock-wrapper">
                <span class="flip-clock-date" id="flipDate"></span>
                <span class="flip-clock" id="flipClock">
                    <span class="flip-digit" id="h1"><span class="digit-current">0</span><span class="digit-next">0</span></span>
                    <span class="flip-digit" id="h2"><span class="digit-current">0</span><span class="digit-next">0</span></span>
                    <span class="colon">:</span>
                    <span class="flip-digit" id="m1"><span class="digit-current">0</span><span class="digit-next">0</span></span>
                    <span class="flip-digit" id="m2"><span class="digit-current">0</span><span class="digit-next">0</span></span>
                </span>
            </div>

            <button id="theme-toggle" onclick="toggleTheme()" title="모드 변경">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        function updateThemeIcon(isDark) {
            const btnIcon = document.querySelector('#theme-toggle i');
            if (btnIcon) {
                if (isDark) {
                    btnIcon.className = 'fas fa-sun';
                    btnIcon.style.color = '#FFD700';
                } else {
                    btnIcon.className = 'fas fa-moon';
                    btnIcon.style.color = '#d3d3d3';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const savedTheme = localStorage.getItem('theme');
            updateThemeIcon(savedTheme === 'dark');

            // ── Flip Clock (KST) ──
            const dowNames = ['일', '월', '화', '수', '목', '금', '토'];

            function getKST() {
                const now = new Date();
                const utc = now.getTime() + now.getTimezoneOffset() * 60000;
                return new Date(utc + 9 * 3600000);
            }

            function flipDigit(id, newVal) {
                const el = document.getElementById(id);
                if (!el) return;
                const cur = el.querySelector('.digit-current');
                const nxt = el.querySelector('.digit-next');
                if (cur.textContent === newVal) return;

                nxt.textContent = newVal;
                el.classList.remove('flipping');
                void el.offsetWidth;
                el.classList.add('flipping');

                setTimeout(() => {
                    cur.textContent = newVal;
                    el.classList.remove('flipping');
                }, 450);
            }

            function updateClock() {
                const now = getKST();
                const y = now.getFullYear();
                const mo = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const dow = dowNames[now.getDay()];
                document.getElementById('flipDate').textContent = y + '.' + mo + '.' + d + ' ' + dow;

                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                flipDigit('h1', h[0]);
                flipDigit('h2', h[1]);
                flipDigit('m1', m[0]);
                flipDigit('m2', m[1]);
            }

            updateClock();
            setInterval(updateClock, 1000);

            // ── 네비게이션 활성화 ──
            const currentPath = window.location.pathname;
            document.querySelectorAll('.navbar a[href]').forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath || (href !== '/' && currentPath.startsWith(href))) {
                    link.classList.add('active');
                }
            });

            // ── 키보드 단축키 ──
            document.addEventListener('keydown', function (event) {
                const tagName = event.target.tagName;
                if (tagName === 'INPUT' || tagName === 'TEXTAREA' || tagName === 'SELECT') return;

                if (event.ctrlKey) {
                    if (event.key === 'a') { event.preventDefault(); window.location.href = "{{ url_for('add_memo_mobile') }}"; }
                    if (event.key === 's') { event.preventDefault(); window.location.href = "{{ url_for('search') }}"; }
                }

                const isSingleKey = !event.ctrlKey && !event.shiftKey && !event.altKey;
                if (isSingleKey) {
                    if (event.code === 'KeyH') window.location.href = "{{ url_for('index') }}";
                    if (event.code === 'KeyM') window.location.href = "{{ url_for('search_memos') }}";
                    if (event.code === 'KeyL') window.location.href = "{{ url_for('infolinks') }}";
                    if (event.code === 'KeyS') window.location.href = "{{ url_for('summary') }}";
                    if (event.code === 'KeyN') window.location.href = "{{ url_for('add_memo_mobile') }}";
                    if (event.code === 'KeyD') window.location.href = "{{ url_for('dashboard.index') }}";
                }
            });

            // ── 드롭다운 메뉴 ──
            const dropdown = document.getElementById('navDropdown');
            if (dropdown) {
                const toggle = dropdown.querySelector('.dropdown-toggle');
                const menu = dropdown.querySelector('.dropdown-menu');

                if (toggle && menu) {
                    let focusIndex = -1;
                    const getItems = () => menu.querySelectorAll('a');

                    function updateFocus() {
                        const items = getItems();
                        items.forEach((item, i) => {
                            item.classList.toggle('kb-focus', i === focusIndex);
                        });
                        if (focusIndex >= 0 && items[focusIndex]) {
                            items[focusIndex].scrollIntoView({ block: 'nearest' });
                        }
                    }

                    toggle.addEventListener('click', function (e) {
                        e.preventDefault();
                        e.stopPropagation();
                        const isOpen = menu.classList.toggle('show');
                        if (isOpen) { focusIndex = -1; updateFocus(); }
                    });

                    document.addEventListener('click', function (e) {
                        if (!dropdown.contains(e.target)) {
                            menu.classList.remove('show');
                            focusIndex = -1;
                            updateFocus();
                        }
                    });

                    document.addEventListener('keydown', function (e) {
                        if (!menu.classList.contains('show')) return;
                        const items = getItems();
                        const count = items.length;

                        if (e.key === 'Escape') {
                            menu.classList.remove('show');
                            focusIndex = -1;
                            updateFocus();
                        } else if (e.key === 'ArrowDown') {
                            e.preventDefault();
                            focusIndex = (focusIndex + 1) % count;
                            updateFocus();
                        } else if (e.key === 'ArrowUp') {
                            e.preventDefault();
                            focusIndex = (focusIndex - 1 + count) % count;
                            updateFocus();
                        } else if (e.key === 'Enter' && focusIndex >= 0 && items[focusIndex]) {
                            e.preventDefault();
                            items[focusIndex].click();
                        }
                    });
                }
            }
        });
    </script>
</body>

</html>
