{% extends "base.html" %}
{% block content %}
<div style="text-align: center; margin: 0 auto; width: 70%; color: black;">
    <h4>이미지 보기</h4>
    <div style="margin-bottom: 20px; border: 1px solid #ccc; display: inline-block;">
        <img id="image" src="{{ url_for('serve_data_file', filename=image.filename) }}" alt="Image" style="max-width: 100%; max-height: 60vh; cursor: pointer;" onclick="openFullscreen();">
    </div>
    <form id="imageForm" method="POST" action="{{ url_for('edit_image', project_id=project.id, image_id=image.id) }}" onsubmit="return confirmDelete()" style="text-align: center;">
        <div style="margin: 0 auto; width: 60%">
            <input type="text" id="memo" name="memo" value="{{ image.memo }}" style="width: 100%; padding: 10px; box-sizing: border-box; text-align: left;">
        </div>
        <div style="margin-bottom: 20px; display: flex; justify-content: center; align-items: center;">
            <input type="checkbox" id="delete" name="delete" style="margin-right: 5px;">
        </div>
        <input type="hidden" name="action" id="action">
        <div style="display: flex; justify-content: space-between; width: 50%; margin: 0 auto;">
            
            <button type="button" onclick="window.location.href='{{ url_for('project_images', project_id=project.id) }}'" style="padding: 10px 10px; background-color: #ffa500; color: white; text-decoration: none; border: none; border-radius: 5px;">Image Box</button>
            <button type="submit" style="padding: 10px 10px; background-color: #28a745; color: white; border: none; border-radius: 5px;">Update</button>
        </div>
    </form>
</div>
<script>
function openFullscreen() {
    var elem = document.getElementById("image");
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.mozRequestFullScreen) { // Firefox
        elem.mozRequestFullScreen();
    } else if (elem.webkitRequestFullscreen) { // Chrome, Safari and Opera
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { // IE/Edge
        elem.msRequestFullscreen();
    }
}

document.addEventListener("DOMContentLoaded", function() {
    var img = document.getElementById("image");
    img.onload = function() {
        var maxHeight = window.innerHeight * 0.6;
        if (img.naturalHeight > maxHeight) {
            img.style.height = maxHeight + "px";
            img.style.width = "auto";
        } else {
            img.style.height = img.naturalHeight + "px";
            img.style.width = img.naturalWidth + "px";
        }
    };
});

function confirmDelete() {
    var deleteCheckbox = document.getElementById('delete');
    if (deleteCheckbox.checked) {
        return confirm('Are you sure you want to delete this image?');
    }
    return true;
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') {
        document.getElementById('action').value = 'prev';
        document.getElementById('imageForm').submit();
    } else if (e.key === 'ArrowRight') {
        document.getElementById('action').value = 'next';
        document.getElementById('imageForm').submit();
    }
});
</script>
{% endblock %}
