<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빠른 메모 작성</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .flash-messages {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
        }
        .flash-messages li {
            padding: 10px;
            border-radius: 4px;
            color: white;
            margin-bottom: 5px;
        }
        .success {
            background-color: #28a745;
        }
        .error {
            background-color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>빠른 메모 작성</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <ul class="flash-messages">
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('quick_memo') }}" method="post">
            <input type="hidden" name="project_id" value="{{ project_id }}">
            
            <label for="project_select">프로젝트 선택 (선택 사항):</label>
            <select id="project_select" name="project_id">
                <option value="">-- 프로젝트 선택 --</option>
                {% for p in projects %}
                <option value="{{ p.id }}">{{ p.title }}</option>
                {% endfor %}
            </select>
            
            <label for="content">메모 내용:</label>
            <textarea id="content" name="content" placeholder="여기에 메모 내용을 입력하세요..." required></textarea>
            
            <button type="submit">메모 저장</button>
        </form>
    </div>
</body>
</html>
