{% extends "base.html" %}
{% block content %}
<div style="width: 60%; margin: 0 auto; text-align: center;">
    <h1>Upload Image</h1>
    <form method="POST" action="{{ url_for('upload_image', project_id=project.id) }}" enctype="multipart/form-data">
        <div style="margin-bottom: 20px;">
            <label for="file">Select Image:</label>
            <input type="file" id="file" name="file" required>
        </div>
        <input type="submit" value="Upload" style="padding: 10px 20px; font-size: 16px;">
    </form>
    <a href="{{ url_for('project', project_id=project.id) }}" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #007BFF; color: white; text-decoration: none; border-radius: 5px;">Back to Project</a>
</div>
{% endblock %}
