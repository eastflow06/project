<!DOCTYPE html>
<html lang="ko">
<head>
    <title>Google Calendar 이벤트</title>
</head>
<body>
    <h1>Google Calendar 이벤트</h1>
    {% if events %}
        <ul>
        {% for event in events %}
            <li>{{ event.summary }} (시작: {{ event.start }})</li>
        {% endfor %}
        </ul>
    {% else %}
        <p>이벤트가 없습니다.</p>
    {% endif %}
</body>
</html>
