{% extends "base.html" %}
{% block title %}
Tag 관리
{% endblock %}
{% block content %}

<div class="modern-container manage-container">
    
    <div class="header-section" style="border-bottom: 2px solid var(--link-color); padding-bottom: 15px; margin-bottom: 30px;">
        <h1 class="title">Tag Management</h1>
    </div>
    
    <div class="form-card">
        <form method="POST" action="{{ url_for('manage_tags') }}">
            <div class="form-group" style="display: flex; gap: 15px; align-items: flex-end;">
                <div style="flex-grow: 1;">
                    <label for="name" class="form-label">New Tag</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="Enter new tag name" required>
                </div>
                <button type="submit" class="btn btn-primary" style="height: 42px; white-space: nowrap;">Add Tag</button>
            </div>
        </form>
    </div>
    
    <div class="header-section" style="margin-top: 40px; margin-bottom: 15px;">
        <h2 style="font-size: 1.4rem; color: var(--text-color); border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Existing Tags</h2>
    </div>

    <div style="overflow-x: auto; border: 1px solid var(--border-color); border-radius: 8px;">
        <table class="table tag-table">
            <thead>
                <tr>
                    <th class="col-id" style="width: 10%; text-align: center;">ID</th>
                    <th class="col-name" style="width: 60%;">Name</th>
                    <th class="col-actions" style="width: 30%; text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for tag in tags %}
                <tr>
                    <td class="col-id" style="text-align: center; color: var(--secondary-text);">{{ tag.id }}</td>
                    <td class="col-name">
                        <form method="POST" action="{{ url_for('update_tag', tag_id=tag.id) }}" class="inline-form" style="display: flex; gap: 10px; width: 100%;">
                            <input type="text" name="name" value="{{ tag.name }}" class="form-input tag-input" required>
                    </td>
                    <td class="col-actions" style="text-align: center;">
                        <div style="display: flex; justify-content: center; gap: 5px;">
                            <button type="submit" class="btn btn-sm btn-primary">Update</button>
                        </form> <form method="POST" action="{{ url_for('delete_tag', tag_id=tag.id) }}" onsubmit="return confirm('Are you sure you want to delete this tag?');" style="display: inline;">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<style>
    /* 기본 데스크톱 스타일 */
    .manage-container {
        width: 80%;
        max-width: 900px;
    }
    .tag-input {
        padding: 6px 10px;
        width: 100%;
        box-sizing: border-box; /* 패딩 포함 너비 계산 */
    }

    /* 모바일 대응 스타일 */
    @media screen and (max-width: 768px) {
        /* 1. 컨테이너 너비 확장 */
        .manage-container {
            width: 100% !important;
            padding: 10px !important;
            margin: 0 !important;
        }

        /* 2. ID 컬럼 숨김 (공간 확보) */
        .col-id {
            display: none !important;
        }

        /* 3. Name 컬럼 강제 표시 및 확장 */
        .col-name {
            display: table-cell !important; /* 다른 CSS에 의해 숨겨지지 않도록 강제 */
            width: 65% !important;
        }
        
        /* 4. Actions 컬럼 너비 조정 */
        .col-actions {
            width: 35% !important;
            white-space: nowrap;
        }

        /* 5. 버튼 및 입력창 크기 최적화 */
        .btn-sm {
            padding: 4px 8px;
            font-size: 12px;
        }
        .tag-input {
            font-size: 14px; /* 모바일 입력 편의성 */
        }
        
        /* 테이블 행 높이 확보 */
        table tr {
            height: 50px;
        }
        
        table td, table th {
            padding: 5px 2px; /* 좌우 패딩 줄임 */
            vertical-align: middle;
        }
    }
</style>

<script>
    // 필요한 경우 추가 스크립트 작성
</script>
{% endblock %}
