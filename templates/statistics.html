{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4 dashboard-container">
    <h1 class="mb-5 text-center dashboard-title fw-bold">📊 프로젝트 현황</h1>

    <table style="width:100%; border-spacing: 5px;">
        <tr>
            <td style="width:33.33%;">
                <div class="card shadow-sm h-100 dashboard-card">
                    <div class="card-header dashboard-card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 text-primary fw-bold" style="margin-top: 0 !important; padding-top: 0 !important;">
                            Research <span id="research-count" class="badge bg-primary ms-2">0</span>
                        </h5>
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center p-3">
                        <div style="height: 300px; width: 100%;">
                            <canvas id="researchChart"></canvas>
                        </div>
                    </div>
                </div>
            </td>
            <td style="width:33.33%;">
                <div class="card shadow-sm h-100 dashboard-card">
                    <div class="card-header dashboard-card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 text-primary fw-bold" style="margin-top: 0 !important; padding-top: 0 !important;">
                            Development <span id="development-count" class="badge bg-warning ms-2">0</span>
                        </h5>
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center p-3">
                        <div style="height: 300px; width: 100%;">
                            <canvas id="developmentChart"></canvas>
                        </div>
                    </div>
                </div>
            </td>
            <td style="width:33.33%;">
                <div class="card shadow-sm h-100 dashboard-card">
                    <div class="card-header dashboard-card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 text-primary fw-bold" style="margin-top: 0 !important; padding-top: 0 !important;">
                            기타 <span id="etc-count" class="badge bg-secondary ms-2">0</span>
                        </h5>
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center p-3">
                        <div style="height: 300px; width: 100%;">
                            <canvas id="etcChart"></canvas>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>

    <div class="row g-4 mt-4">
        <div class="col-lg-6 col-md-12">
            <div class="card shadow-sm h-100 dashboard-card">
                <div class="card-header dashboard-card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-warning fw-bold">제품별 프로젝트 기여도</h5>
                </div>
                <div class="card-body p-3">
                    <div style="height: 300px; width: 100%;">
                        <canvas id="projectsPerProductChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-lg-6 col-md-12">
            <div class="card shadow-sm h-100 dashboard-card">
                <div class="card-header dashboard-card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-primary fw-bold" style="margin-top: 0 !important; padding-top: 0 !important;">제품별 미완료 태스크 현황</h5>
                </div>
                <div class="card-body p-3">
                    <div style="height: 300px; width: 100%;">
                        <canvas id="tasksPerProductChart"></canvas>
                    </div>
                </div>
            </div>
        </div>      
        
        <div class="col-lg-6 col-md-12">
            <div class="card shadow-sm h-100 dashboard-card">
                <div class="card-header dashboard-card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-info fw-bold"><i class="fas fa-list-alt text-muted"></i>프로젝트별 태스크 로드 (Top 10)</h5>
                </div>
                <div class="card-body p-3">
                    <div style="height: 300px; width: 100%;">
                        <canvas id="tasksPerProjectChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{# 외부 라이브러리 및 커스텀 스크립트 #}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

<style>
    /* =========================================
       1. 대시보드 다크모드 대응 CSS
       ========================================= */
    :root {
        /* [라이트 모드] */
        --dash-bg: #f0f2f5;
        --card-bg: #ffffff;
        --card-header-bg: #f7f9fa;
        --card-border: #e0e0e0;
        --text-primary: #333333;
        --text-muted: #a0a0a0;
        --shadow-color: rgba(0, 0, 0, 0.05);
        --shadow-hover: rgba(0, 0, 0, 0.08);
    }

    body.dark-mode {
        /* [다크 모드] */
        --dash-bg: #1e1e1e;           /* 전체 배경 어둡게 */
        --card-bg: #2d2d2d;           /* 카드 배경 */
        --card-header-bg: #383838;    /* 카드 헤더 */
        --card-border: #444444;       /* 테두리 */
        --text-primary: #e0e0e0;      /* 기본 텍스트 밝게 */
        --text-muted: #bbbbbb;        /* 보조 텍스트 */
        --shadow-color: rgba(0, 0, 0, 0.2);
        --shadow-hover: rgba(0, 0, 0, 0.4);
    }

    /* 배경 및 폰트 */
    body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--dash-bg); transition: background-color 0.3s; }
    
    .dashboard-container { max-width: 1400px; margin: auto; padding-top: 0rem; }
    
    .dashboard-title { 
        font-size: 1.6rem; 
        color: var(--text-primary); /* 다크모드 대응 */
        margin-top: 0.5rem; 
        margin-bottom: 1rem !important; 
        letter-spacing: -0.05em; 
    }

    /* 카드 스타일 */
    .dashboard-card { 
        border: 1px solid var(--card-border); 
        border-radius: 8px; 
        background-color: var(--card-bg); /* 다크모드 대응 */
        box-shadow: 0 4px 12px var(--shadow-color); 
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out, background-color 0.3s; 
    }
    .dashboard-card:hover { 
        transform: translateY(-3px); 
        box-shadow: 0 6px 16px var(--shadow-hover); 
    }

    /* 카드 헤더 */
    .dashboard-card-header { 
        background-color: var(--card-header-bg); 
        border-bottom: 1px solid var(--card-border); 
        padding: 0.25rem 1.0rem; 
        font-size: 1.05rem; 
        font-weight: 600; 
        color: var(--text-primary); 
        border-top-left-radius: 8px; 
        border-top-right-radius: 8px; 
    }
    .dashboard-card-header h5 { 
        font-size: 1.1rem; 
        color: var(--text-primary); /* 다크모드 대응 */
        margin-bottom: 0; 
    }
    .dashboard-card-header .fas { color: var(--text-muted); font-size: 1.2rem; }
    
    .dashboard-card .card-body { padding: 0.5rem; }

    /* 텍스트 컬러 유틸리티 (부트스트랩 오버라이드) */
    .text-primary { color: #5B8FF9 !important; }
    .text-success { color: #5AD8A6 !important; }
    .text-warning { color: #F6BD16 !important; }
    .text-info { color: #6DC8EC !important; }
    .text-secondary { color: #5D7092 !important; }
    .text-muted { color: var(--text-muted) !important; }
    .text-danger { color: #E8684A !important; }
    
    /* 다크모드일 때 차트 텍스트 컬러 조정 (배경과 대비) */
    body.dark-mode .text-primary { color: #8ab4f8 !important; } /* 조금 더 밝은 블루 */
    body.dark-mode .text-secondary { color: #8da4c4 !important; }
</style>

<script>
    Chart.register(ChartDataLabels);

    document.addEventListener('DOMContentLoaded', function() {
        // 다크모드 상태 감지 함수
        function isDarkMode() {
            return document.body.classList.contains('dark-mode');
        }

        // 차트 색상 설정 함수 (다크모드 여부에 따라 동적 반환)
        function getChartColors() {
            const dark = isDarkMode();
            return {
                fontColor: dark ? '#e0e0e0' : '#4a4a4a', // 텍스트 색상
                gridColor: dark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(0, 0, 0, 0.08)', // 그리드 색상
                borderColor: dark ? '#2d2d2d' : '#ffffff', // 도넛 차트 경계선
                tooltipBg: dark ? 'rgba(255, 255, 255, 0.9)' : 'rgba(50, 50, 50, 0.9)', // 툴팁 배경
                tooltipText: dark ? '#000' : '#fff' // 툴팁 글자
            };
        }

        // 에러 핸들링 함수
        function handleError(error, context) {
            console.error(`${context}에서 오류 발생:`, error);
        }

        // 차트 색상 팔레트
        const chartColors = [
            '#5B8FF9', '#5AD8A6', '#5D7092', '#F6BD16', '#E8684A', 
            '#6DC8EC', '#9270CA', '#FF9D4D', '#269A99', '#FF99C3'
        ];

        // 공통 차트 옵션 생성기 (함수로 변경하여 호출 시점의 테마 반영)
        function getCommonChartOptions() {
            const colors = getChartColors();
            return {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            font: { size: 11, family: 'Noto Sans KR, sans-serif', weight: '500' },
                            color: colors.fontColor, // 동적 색상
                            boxWidth: 12,
                            padding: 15,
                        }
                    },
                    tooltip: {
                        backgroundColor: colors.tooltipBg,
                        titleColor: colors.tooltipText,
                        bodyColor: colors.tooltipText,
                        titleFont: { size: 14, family: 'Noto Sans KR, sans-serif', weight: 'bold' },
                        bodyFont: { size: 14, family: 'Noto Sans KR, sans-serif' },
                        cornerRadius: 4,
                        displayColors: true,
                        bodySpacing: 4,
                        padding: 10,
                        callbacks: {
                            label: function(tooltipItem) {
                                const label = tooltipItem.label || '';
                                const value = tooltipItem.raw;
                                return `${label}: ${value}개`;
                            }
                        }
                    },
                    datalabels: {
                        color: '#fff',
                        formatter: (value, context) => {
                            if (context.chart.config.type === 'doughnut' || context.chart.config.type === 'pie') {
                                const total = context.chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
                                if (total === 0) return '0%';
                                const percentage = parseFloat((value / total * 100).toFixed(1));
                                return percentage > 5 ? `${percentage}%` : '';
                            }
                            return value > 0 ? value : '';
                        },
                        font: { weight: 'bold', size: 10, family: 'Noto Sans KR, sans-serif' },
                        textShadowColor: 'rgba(0,0,0,0.4)',
                        textShadowBlur: 2
                    }
                },
                layout: {
                    padding: { left: 10, right: 10, top: 10, bottom: 10 }
                },
                // 축 색상 설정 (Bar chart용)
                scales: {
                    x: { 
                        ticks: { color: colors.fontColor },
                        grid: { display: false } 
                    },
                    y: { 
                        ticks: { color: colors.fontColor },
                        grid: { color: colors.gridColor } 
                    }
                }
            };
        }

        // Data fetching function
        async function fetchData() {
            try {
                const [statsResponse, tasksPerProductResponse, statsPerCategoryResponse] = await Promise.all([
                    fetch('/api/stats_data'),
                    fetch('/api/tasks_per_product_data'),
                    fetch('/api/stats_per_category')
                ]);

                if (!statsResponse.ok || !tasksPerProductResponse.ok || !statsPerCategoryResponse.ok) {
                    throw new Error("API 요청 실패");
                }

                const statsData = await statsResponse.json();
                const tasksPerProductData = await tasksPerProductResponse.json();
                const statsPerCategoryData = await statsPerCategoryResponse.json();

                return { statsData, tasksPerProductData, statsPerCategoryData };
            } catch (error) {
                handleError(error, 'API 데이터 요청');
                throw error;
            }
        }

        // 전역 차트 인스턴스 배열 (테마 전환 시 업데이트용)
        let chartInstances = [];

        // Doughnut chart creation
        function createDoughnutChart(canvasId, labels, data) {
            const colors = getChartColors();
            const chart = new Chart(document.getElementById(canvasId), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: chartColors.slice(0, labels.length),
                        borderColor: colors.borderColor, // 동적 경계선 색상
                        borderWidth: 2,
                        hoverOffset: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: getCommonChartOptions().plugins.tooltip, // 공통 툴팁 설정 재사용
                        datalabels: {
                            color: '#fff',
                            formatter: (value, context) => {
                                const label = context.chart.data.labels[context.dataIndex];
                                return `${label}\n(${value})`;
                            },
                            font: { weight: 'bold', size: 15, family: 'Noto Sans KR, sans-serif' },
                            textShadowColor: 'rgba(0,0,0,0.4)',
                            textShadowBlur: 2,
                            textAlign: 'center'
                        }
                    },
                    cutout: '50%'
                }
            });
            chartInstances.push(chart);
        }

        // Bar chart creation
        function createBarChart(canvasId, labels, data, datasetLabel) {
            const options = getCommonChartOptions();
            const chart = new Chart(document.getElementById(canvasId), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: datasetLabel,
                        data: data,
                        backgroundColor: chartColors.slice(0, labels.length).map(color => `${color}D9`),
                        borderColor: chartColors.slice(0, labels.length),
                        borderWidth: 1
                    }]
                },
                options: {
                    ...options,
                    plugins: {
                        ...options.plugins,
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            color: getChartColors().fontColor, // 동적 색상
                            textShadowColor: 'transparent'
                        }
                    },
                    scales: {
                        x: { 
                            grid: { display: false }, 
                            ticks: { color: getChartColors().fontColor, font: { size: 14, family: 'Noto Sans KR, sans-serif' } } 
                        },
                        y: { 
                            beginAtZero: true, 
                            grid: { color: getChartColors().gridColor, drawBorder: false }, 
                            ticks: { color: getChartColors().fontColor, font: { size: 14, family: 'Noto Sans KR, sans-serif' } } 
                        }
                    }
                }
            });
            chartInstances.push(chart);
        }
        
        // Main initialization function
        async function initializeCharts() {
            try {
                const { statsData, tasksPerProductData, statsPerCategoryData } = await fetchData();
                
                createDoughnutChart('researchChart', statsPerCategoryData.research.labels, statsPerCategoryData.research.data);
                createDoughnutChart('developmentChart', statsPerCategoryData.development.labels, statsPerCategoryData.development.data);
                createDoughnutChart('etcChart', statsPerCategoryData.etc.labels, statsPerCategoryData.etc.data);

                document.getElementById('research-count').textContent = `(${statsPerCategoryData.research.data.reduce((a, b) => a + b, 0)})`;
                document.getElementById('development-count').textContent = `(${statsPerCategoryData.development.data.reduce((a, b) => a + b, 0)})`;
                document.getElementById('etc-count').textContent = `(${statsPerCategoryData.etc.data.reduce((a, b) => a + b, 0)})`;
 
                createBarChart('projectsPerProductChart', statsData.projects_per_product.labels, statsData.projects_per_product.data, '프로젝트 수');
                createBarChart('tasksPerProductChart', tasksPerProductData.labels, tasksPerProductData.data, '미완료 태스크 수');
                
                // Horizontal Bar Chart
                const colors = getChartColors();
                const chart = new Chart(document.getElementById('tasksPerProjectChart'), {
                    type: 'bar',
                    data: {
                        labels: statsData.tasks_per_project.labels,
                        datasets: [{
                            label: '태스크 수',
                            data: statsData.tasks_per_project.data,
                            backgroundColor: chartColors.slice(0, statsData.tasks_per_project.labels.length).map(color => `${color}D9`),
                            borderColor: chartColors.slice(0, statsData.tasks_per_project.labels.length),
                            borderWidth: 1
                        }]
                    },
                    options: {
                        ...getCommonChartOptions(),
                        indexAxis: 'y',
                        onClick: (e, activeElements) => {
                            if (activeElements.length > 0) {
                                const index = activeElements[0].index;
                                const projectId = statsData.tasks_per_project.ids ? statsData.tasks_per_project.ids[index] : null;
                                if (projectId) window.location.href = `/project/${projectId}`;
                            }
                        },
                        plugins: {
                            ...getCommonChartOptions().plugins,
                            datalabels: {
                                anchor: 'end', align: 'right', color: colors.fontColor, textShadowColor: 'transparent'
                            }
                        },
                        scales: {
                            x: {
                                beginAtZero: true,
                                suggestedMax: Math.ceil(Math.max(...statsData.tasks_per_project.data) * 1.3),
                                grid: { color: colors.gridColor, drawBorder: false },
                                ticks: { precision: 0, color: colors.fontColor, font: { size: 10, family: 'Noto Sans KR, sans-serif' } }
                            },
                            y: { 
                                grid: { display: false }, 
                                ticks: { color: colors.fontColor, font: { size: 14, family: 'Noto Sans KR, sans-serif' } } 
                            }
                        }
                    }
                });
                chartInstances.push(chart);

            } catch (error) {
                handleError(error, '차트 초기화');
            }
        }

        // 테마 변경 감지 및 차트 업데이트 (MutationObserver 사용)
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.attributeName === "class") {
                    updateChartsTheme();
                }
            });
        });
        observer.observe(document.body, { attributes: true });

        function updateChartsTheme() {
            const colors = getChartColors();
            chartInstances.forEach(chart => {
                // 공통 옵션 업데이트
                if (chart.options.scales.x) {
                    chart.options.scales.x.ticks.color = colors.fontColor;
                    if(chart.options.scales.x.grid) chart.options.scales.x.grid.color = colors.gridColor;
                }
                if (chart.options.scales.y) {
                    chart.options.scales.y.ticks.color = colors.fontColor;
                    if(chart.options.scales.y.grid) chart.options.scales.y.grid.color = colors.gridColor;
                }
                
                // 범례 및 데이터라벨 업데이트
                if (chart.options.plugins.legend) {
                    chart.options.plugins.legend.labels.color = colors.fontColor;
                }
                if (chart.options.plugins.datalabels && chart.config.type !== 'doughnut') { // 도넛 차트 내부 글씨는 항상 흰색 유지
                     chart.options.plugins.datalabels.color = colors.fontColor;
                }
                
                // 도넛 차트 경계선 업데이트
                if (chart.config.type === 'doughnut') {
                    chart.data.datasets.forEach(dataset => {
                        dataset.borderColor = colors.borderColor;
                    });
                }
                
                chart.update();
            });
        }
        
        // Run initialization
        initializeCharts();
    });
</script>
{% endblock %}
